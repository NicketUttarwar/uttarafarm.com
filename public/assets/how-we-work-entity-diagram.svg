<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">How We Work 5-Step Entity Diagram</title>
  <desc id="desc">A five step entity style flow: Consultation, Overview and Evaluation, Regular Field Support, Infrastructure and Funding Support, and Knowledge and Distribution Enablement.</desc>
  <defs>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #1f5e41; }
      .subtitle { font: 24px Arial, sans-serif; fill: #6d5846; }
      .step-title { font: 700 25px Arial, sans-serif; fill: #1f5e41; }
      .step-body { font: 20px Arial, sans-serif; fill: #6d5846; }
      .badge { font: 700 20px Arial, sans-serif; fill: #fff; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1f5e41" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="860" fill="#ffffff"/>
  <rect x="90" y="120" width="1220" height="640" rx="26" ry="26" fill="#ffffff" stroke="#d4e0d9" stroke-width="2"/>

  <text x="90" y="72" class="title">How We Work - 5-Step Farmer Operating Model</text>
  <text x="90" y="108" class="subtitle">Entity-style flow from farmer onboarding to market enablement</text>

  <!-- Row 1 -->
  <rect x="130" y="170" width="530" height="140" rx="24" ry="24" fill="#f7f3e8" stroke="#8fb29f" stroke-width="2"/>
  <circle cx="106" cy="240" r="24" fill="#c9802a"/><text x="98" y="247" class="badge">1</text>
  <text x="160" y="218" class="step-title">Consultation</text>
  <text x="160" y="254" class="step-body">Understand goals, constraints, and season priorities.</text>

  <rect x="740" y="170" width="530" height="140" rx="24" ry="24" fill="#f7f3e8" stroke="#8fb29f" stroke-width="2"/>
  <circle cx="716" cy="240" r="24" fill="#c9802a"/><text x="708" y="247" class="badge">2</text>
  <text x="770" y="218" class="step-title">Overview and Evaluation</text>
  <text x="770" y="254" class="step-body">Assess farm conditions, crop potential, and gaps.</text>

  <!-- Row 2 -->
  <rect x="130" y="360" width="530" height="140" rx="24" ry="24" fill="#f7f3e8" stroke="#8fb29f" stroke-width="2"/>
  <circle cx="106" cy="430" r="24" fill="#c9802a"/><text x="98" y="437" class="badge">3</text>
  <text x="160" y="408" class="step-title">Regular Field Support</text>
  <text x="160" y="444" class="step-body">Consultants visit regularly for in-season decisions.</text>

  <rect x="740" y="360" width="530" height="140" rx="24" ry="24" fill="#f7f3e8" stroke="#8fb29f" stroke-width="2"/>
  <circle cx="716" cy="430" r="24" fill="#c9802a"/><text x="708" y="437" class="badge">4</text>
  <text x="770" y="408" class="step-title">Infrastructure and Funding Support</text>
  <text x="770" y="444" class="step-body">Plan practical interventions to close critical gaps.</text>

  <!-- Row 3 -->
  <rect x="130" y="550" width="1140" height="140" rx="24" ry="24" fill="#f7f3e8" stroke="#8fb29f" stroke-width="2"/>
  <circle cx="106" cy="620" r="24" fill="#c9802a"/><text x="98" y="627" class="badge">5</text>
  <text x="160" y="598" class="step-title">Knowledge and Distribution Enablement</text>
  <text x="160" y="634" class="step-body">Improve farmer capability and link output to stronger market pathways.</text>

  <!-- Arrows -->
  <line x1="660" y1="240" x2="740" y2="240" stroke="#1f5e41" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1005 310 L1005 335 L395 335 L395 360" fill="none" stroke="#1f5e41" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="660" y1="430" x2="740" y2="430" stroke="#1f5e41" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1005 500 L1005 525 L700 525 L700 550" fill="none" stroke="#1f5e41" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
